<?xml version='1.0' encoding='UTF-8' ?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head><title>Like Hero To Zero</title></h:head>
<h:body>
    <h1>Land hinzufügen</h1>
    <h:form id="landHinzufuegen">
    <p:dataTable var="land" value="#{Laender.neuesLand}">
        <p:column headerText="Land">
            <p:inputText id="name" value="#{land.name}" required="true"/>
            <p:tooltip id="ttname" for="name" showEvent="focus" hideEvent="blur" position="top" value="Bitte gebe den Namen des Landes an."/>
        </p:column>
        <p:column headerText="Ländercode">
            <p:inputText id="laendercode" value="#{land.laendercode}" maxlength="2" required="true"/>
            <p:tooltip id="ttlaendercode" for="laendercode" showEvent="focus" hideEvent="blur" position="top" value="Bitte gebe den zweistelligen Ländercode nach ISO 3166-1."/>
        </p:column>
        <p:column headerText="Jährliche CO2-Emision">
            <p:inputNumber id="co2Emision" value="#{land.co2Emission}" symbol=" t" symbolPosition="s" decimalPlaces="2" required="true" title="Bitte gebe die CO2-Emmisionen an."/>
            <p:tooltip id="ttco2Emision" for="co2Emision" showEvent="focus" hideEvent="blur" position="top" value="Bitte gebe die CO2-Emmisionen an."/>
        </p:column>
        <p:column headerText="Meldedatum">
            <p:datePicker id="datum" value="#{land.gemeldetAm}" locale="de" patter="dd.MM.yyyy" required="true" title="Bitte gebe das Datum deiner Meldung an."/>
            <p:tooltip id="ttdatum" for="datum" showEvent="focus" hideEvent="blur" position="top"/>
        </p:column>
    </p:dataTable>
        <h:panelGrid columns="2">
            <p:commandButton value="Zurück" icon="pi pi-arrow-left" immediate="true" action="#{Laender.abbruch()}"/>
            <p:commandButton value="Land hinzufügen" icon="pi pi-save" update="landHinzufuegen" action="#{Laender.handleSave()}" />
        </h:panelGrid>
        <p:growl id="growl" showDetail="true" life="3000" />
        <p:messages id="messages" showDetail="true" closable="true" />
        <p:tooltip globalSelector="input, .ui-inputfield" showEvent="focus" hideEvent="blur" position="top"/>

    </h:form>


</h:body>
</html>
