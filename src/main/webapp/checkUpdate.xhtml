<?xml version='1.0' encoding='UTF-8' ?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head><title>Like Hero To Zero</title></h:head>
<h:body>
    <h1>Aktualisierungen und neue Länder prüfen</h1>
    <h:form>
        <p:dataTable var="land" value="#{Laender.laenderListe}">
            <p:column headerText="Land">
                <h:outputText value="#{land.name}"/>
            </p:column>
            <p:column headerText="Ländercode">
                <h:outputText value="#{land.laendercode}"/>
            </p:column>
            <p:column headerText="Jährliche CO2-Emision">
                <h:outputText value="#{land.co2Emission}"/>
            </p:column>
            <p:column headerText="Meldedatum">
                <p:datePicker value="#{land.gemeldetAm}" patter="dd.MM.yyyy" disabled="true">
                </p:datePicker>
            </p:column>
        </p:dataTable>
        <p:commandButton value="Liste anzeigen" icon="pi pi-pencil" action="#{controller.showCO2()}"/>
        <p:commandButton value="Liste bearbeiten" icon="pi pi-pencil" action="#{controller.startEdit()}"/>
    </h:form>



</h:body>
</html>
